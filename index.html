<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Shadow Fighter 2D</title>
<style>
body{
    margin:0;
    overflow:hidden;
    background:#111;
    color:white;
    font-family:Arial;
}
canvas{
    background:linear-gradient(#222,#000);
    display:block;
    margin:auto;
}
#ui{
    position:absolute;
    top:10px;
    left:10px;
}
</style>
</head>
<body>

<div id="ui">
    ❤️ Health: <span id="health">100</span>
    &nbsp;&nbsp; 💰 Score: <span id="score">0</span>
</div>

<canvas id="game" width="800" height="400"></canvas>

<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

let player={
    x:100,
    y:300,
    width:40,
    height:60,
    color:"cyan",
    dx:0,
    dy:0,
    jumping:false,
    health:100
};

let enemy={
    x:600,
    y:300,
    width:40,
    height:60,
    color:"red",
    health:50
};

let gravity=0.8;
let score=0;

function drawRect(obj){
    ctx.fillStyle=obj.color;
    ctx.fillRect(obj.x,obj.y,obj.width,obj.height);
}

function update(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    // Player movement
    player.dy+=gravity;
    player.y+=player.dy;
    player.x+=player.dx;

    if(player.y+player.height>canvas.height){
        player.y=canvas.height-player.height;
        player.dy=0;
        player.jumping=false;
    }

    // Enemy simple AI
    if(enemy.x>player.x){
        enemy.x-=1;
    }else{
        enemy.x+=1;
    }

    drawRect(player);
    drawRect(enemy);

    checkCollision();

    document.getElementById("health").innerText=player.health;
    document.getElementById("score").innerText=score;

    requestAnimationFrame(update);
}

function checkCollision(){
    if(player.x<enemy.x+enemy.width &&
       player.x+player.width>enemy.x &&
       player.y<enemy.y+enemy.height &&
       player.y+player.height>enemy.y){

        player.health-=0.5;
        if(player.health<=0){
            alert("Game Over!");
            location.reload();
        }
    }
}

document.addEventListener("keydown",function(e){
    if(e.key==="ArrowRight") player.dx=5;
    if(e.key==="ArrowLeft") player.dx=-5;

    if(e.key===" " && !player.jumping){
        player.dy=-15;
        player.jumping=true;
    }

    if(e.key==="a"){
        // Attack
        if(Math.abs(player.x-enemy.x)<50){
            enemy.health-=10;
            score+=10;
            if(enemy.health<=0){
                enemy.x=800;
                enemy.health=50;
            }
        }
    }
});

document.addEventListener("keyup",function(e){
    if(e.key==="ArrowRight"||e.key==="ArrowLeft"){
        player.dx=0;
    }
});

update();
</script>

</body>
</html>
