<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Speed Rush Pro</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{
    margin:0;
    overflow:hidden;
    background:#111;
    font-family:Arial;
    color:white;
    text-align:center;
}
canvas{
    background:#222;
    display:block;
    margin:auto;
}
.controls{
    position:fixed;
    bottom:20px;
    width:100%;
    display:flex;
    justify-content:space-around;
}
button{
    width:120px;
    height:60px;
    font-size:20px;
    border:none;
    border-radius:10px;
    background:orange;
}
</style>
</head>
<body>

<h3>🚗 Speed Rush Pro</h3>
Score: <span id="score">0</span> |
💰 Coins: <span id="coins">0</span> |
🏆 Level: <span id="level">1</span>

<canvas id="game" width="350" height="500"></canvas>

<div class="controls">
    <button ontouchstart="moveLeft()">⬅ Left</button>
    <button ontouchstart="moveRight()">Right ➡</button>
</div>

<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

let car={x:150,y:420,width:50,height:80};
let obstacles=[];
let coinsObj=[];
let speed=3;
let score=0;
let coins=0;
let level=1;
let roadLineY=0;

function drawRoad(){
    ctx.fillStyle="white";
    for(let i=0;i<10;i++){
        ctx.fillRect(170,roadLineY+i*60,10,30);
    }
    roadLineY+=speed;
    if(roadLineY>60) roadLineY=0;
}

function drawCar(){
    ctx.fillStyle="cyan";
    ctx.fillRect(car.x,car.y,car.width,car.height);
}

function createObstacle(){
    let x=Math.random()*300;
    obstacles.push({x:x,y:-80,width:50,height:80});
}

function createCoin(){
    let x=Math.random()*300;
    coinsObj.push({x:x,y:-20,width:20,height:20});
}

function update(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    drawRoad();
    drawCar();

    ctx.fillStyle="red";
    obstacles.forEach((o,index)=>{
        o.y+=speed;
        ctx.fillRect(o.x,o.y,o.width,o.height);

        if(o.y>500){
            obstacles.splice(index,1);
            score++;
        }

        if(car.x<o.x+o.width &&
           car.x+car.width>o.x &&
           car.y<o.y+o.height &&
           car.y+car.height>o.y){
            alert("💥 Game Over!\nScore: "+score+"\nCoins: "+coins);
            location.reload();
        }
    });

    ctx.fillStyle="yellow";
    coinsObj.forEach((c,index)=>{
        c.y+=speed;
        ctx.fillRect(c.x,c.y,c.width,c.height);

        if(car.x<c.x+c.width &&
           car.x+car.width>c.x &&
           car.y<c.y+c.height &&
           car.y+car.height>c.y){
            coins++;
            coinsObj.splice(index,1);
        }
    });

    if(score>10) level=2;
    if(score>25) level=3;
    if(score>50) level=4;

    speed=3+level*0.5;

    document.getElementById("score").innerText=score;
    document.getElementById("coins").innerText=coins;
    document.getElementById("level").innerText=level;

    requestAnimationFrame(update);
}

function moveLeft(){
    if(car.x>0) car.x-=40;
}

function moveRight(){
    if(car.x<300) car.x+=40;
}

setInterval(createObstacle,1500);
setInterval(createCoin,2000);

update();
</script>

</body>
</html>
